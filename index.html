<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Document Gateway</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .verification-container { background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; text-align: center; }
        h3 { color: #111827; margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sub-text { font-size: 13px; color: #4b5563; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #374151; margin-bottom: 6px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #2563eb; outline: none; }
        .captcha-box { display: inline-block; background: #111827; color: #ffffff; font-weight: bold; font-size: 20px; letter-spacing: 4px; padding: 8px 25px; font-family: monospace; border-radius: 4px; margin-bottom: 20px; user-select: none; }
        .btn-submit { width: 100%; padding: 12px; background-color: #059669; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-submit:hover { background-color: #047857; }
    </style>
</head>
<body>

<div class="verification-container">
    <h3>Document Verification</h3>
    <div class="sub-text">Please enter the security pin to access your file</div>
    
    <div class="input-group">
        <label>Security Pin (Case Sensitive)</label>
        <input type="text" id="captchaInput" placeholder="Enter characters shown below" autocomplete="off">
    </div>
    
    <div class="captcha-box">xg87DG</div>
    
    <button class="btn-submit" onclick="verifyAndRedirect()">Submit Code</button>
</div>

<script>
    function verifyAndRedirect() {
        var validPin = "xg87DG";
        var userInp = document.getElementById("captchaInput").value.trim();
        
        if (userInp === validPin) {
            // Direct reference to the raw file endpoint to open your PDF instantly
            window.location.href = "https://drive.google.com/file/d/1J60ngryRKtIkQO4h_asE60wVFfYjBkcx/view?usp=drive_link";
        } else {
            alert("Security Pin Incorrect. Please re-enter 'xg87DG' exactly as shown.");
            document.getElementById("captchaInput").value = "";
        }
    }
</script>

</body>
</html>
