<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIONAL ELIGIBILITY CUM ENTRANCE TEST (UG) - 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        
        /* Premium Header Grid For All 4 Logos */
        .header-banner { width: 100%; max-width: 1200px; margin: auto; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: white; box-sizing: border-box; }
        .logo-group-left { display: flex; align-items: center; gap: 15px; }
        .logo-group-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        
        .header-text { text-align: center; font-weight: bold; color: #111; font-size: 15px; line-height: 1.4; flex-grow: 1; padding: 0 20px; text-transform: uppercase; }
        .blue-divider-bar { width: 100%; height: 35px; background-color: #002e5b; margin: 0; padding: 0; }
        
        /* Central Login Box */
        .main-container { max-width: 680px; margin: 50px auto; background: white; border: 1px solid #d2d6de; box-shadow: 0px 4px 12px rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; }
        .card-header { background-color: #002e5b; color: white; padding: 10px 15px; font-weight: bold; font-size: 15px; display: flex; align-items: center; letter-spacing: 0.5px; }
        .card-body { padding: 35px 25px; display: flex; flex-direction: column; align-items: center; }
        
        .form-group { display: flex; width: 100%; max-width: 520px; margin-bottom: 15px; align-items: center; }
        .form-label { width: 45%; font-size: 13px; color: #222; text-align: right; padding-right: 15px; font-weight: 500; }
        .form-input { width: 55%; padding: 7px; border: 1px solid #b5bbc8; font-size: 14px; border-radius: 2px; }
        
        .captcha-container { display: flex; align-items: center; width: 100%; max-width: 520px; margin-bottom: 20px; padding-left: 45%; box-sizing: border-box; }
        .captcha-image-box { background: #00008b; color: white; font-weight: bold; font-size: 19px; letter-spacing: 2px; padding: 5px 15px; font-family: monospace; border-radius: 2px; user-select: none; }
        .refresh-btn { font-size: 18px; color: #28a745; margin-left: 10px; cursor: pointer; background: none; border: none; font-weight: bold; }
        
        .submit-btn { background-color: #00875a; color: white; border: none; padding: 8px 28px; font-weight: bold; font-size: 13px; border-radius: 2px; cursor: pointer; margin-left: 45%; text-transform: uppercase; letter-spacing: 0.5px; }
        .footer { width: 100%; background-color: #001f3f; color: white; text-align: center; padding: 12px 0; font-size: 11px; position: fixed; bottom: 0; left: 0; letter-spacing: 0.3px; }
    </style>
</head>
<body>

    <!-- Header Section With All 4 Live Web Logos Layout -->
    <div class="header-banner">
        <!-- Left Side: India Emblem + Ministry of Education -->
        <div class="logo-group-left">
            <img src="https://india.gov.in" alt="Emblem" style="height: 45px;">
            <img src="https://education.gov.in" alt="Ministry Logo" style="height: 45px;">
        </div>
        
        <!-- Center Text -->
        <div class="header-text">
            NATIONAL ELIGIBILITY CUM ENTRANCE TEST (UG) – 2026<br>
            <span style="font-weight: normal; font-size: 14px; color: #444; text-transform: none;">Score Card</span>
        </div>
        
        <!-- Right Side: NTA Logo + NMC Logo Stack -->
        <div class="logo-group-right">
            <img src="https://nta.ac.in" alt="NTA Logo" style="height: 40px;">
            <img src="https://nmc.org.in" alt="NMC Logo" style="height: 35px; margin-top: 2px;">
        </div>
    </div>

    <!-- Blue Visual Separator Line Bar -->
    <div class="blue-divider-bar"></div>

    <!-- Central Verification Form -->
    <div class="main-container">
        <div class="card-header">&#128196; View Result</div>
        <div class="card-body">
            <div class="form-group">
                <div class="form-label">Enter CAPTCHA (case sensitive) :</div>
                <input type="text" id="enteredCaptcha" class="form-input" autocomplete="off">
            </div>
            <div class="captcha-container">
                <div class="captcha-image-box">xg87DG</div>
                <button type="button" class="refresh-btn" onclick="alert('Security Pin Reset Successful!')">⟳</button>
            </div>
            <button onclick="handleVerification()" class="submit-btn">SUBMIT</button>
        </div>
    </div>

    <!-- Dynamic Footer System -->
    <div class="footer">
        This site is designed and hosted by NIC PEP Division. The contents are provided by NTA. For any further information, please contact NTA.
    </div>

    <script>
        function handleVerification() {
            var officialCaptchaCode = "xg87DG";
            var userValue = document.getElementById("enteredCaptcha").value.trim();

            if (userValue === officialCaptchaCode) {
                // Instantly routes directly to your existing secure Google Drive file link
                window.location.href = "https://google.com";
            } else {
                alert("Incorrect CAPTCHA! Code is case sensitive. Please re-enter xg87DG.");
            }
        }
    </script>

</body>
</html>
